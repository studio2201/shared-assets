<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 512 512">
  <!-- Outer glowing green circle aura -->
  <circle cx="256" cy="256" r="232.7" style="opacity:.15;fill:#00ff66"/>
  <!-- Outer green rim -->
  <path d="M256 512C114.8 512 0 397.2 0 256S114.8 0 256 0s256 114.8 256 256-114.8 256-256 256m0-465.4c-115.5 0-209.5 94-209.5 209.5s94 209.5 209.5 209.5 209.5-94 209.5-209.5c0-115.6-94-209.5-209.5-209.5" style="fill:#00ff66"/>
  <g style="fill:#00ff66">
    <!-- Metroid Outer Jelly Membrane -->
    <path d="M 256,120 C 170,120 140,180 140,250 C 140,300 170,330 200,340 C 210,340 220,330 225,320 C 235,300 245,290 256,290 C 267,290 277,300 287,320 C 292,330 302,340 312,340 C 342,330 372,300 372,250 C 372,180 342,120 256,120 Z" style="fill:#00ff66; fill-opacity:0.25; stroke:#00ff66; stroke-width:12; stroke-linejoin:round;"/>
    
    <!-- Red Nuclei inside -->
    <!-- Center Top Nucleus -->
    <circle cx="256" cy="200" r="28" style="fill:#ff3333; stroke:#ffffff; stroke-width:4; filter: drop-shadow(0px 0px 8px rgba(255, 51, 51, 0.8));"/>
    <!-- Left Bottom Nucleus -->
    <circle cx="210" cy="255" r="24" style="fill:#ff3333; stroke:#ffffff; stroke-width:4; filter: drop-shadow(0px 0px 8px rgba(255, 51, 51, 0.8));"/>
    <!-- Right Bottom Nucleus -->
    <circle cx="302" cy="255" r="24" style="fill:#ff3333; stroke:#ffffff; stroke-width:4; filter: drop-shadow(0px 0px 8px rgba(255, 51, 51, 0.8));"/>

    <!-- Inside veins/connectors connecting nuclei -->
    <path d="M 256,200 L 210,255 M 256,200 L 302,255 M 210,255 L 302,255" style="stroke:#ff3333; stroke-width:6; stroke-linecap:round; opacity:0.7;"/>

    <!-- Metroid Fangs / Claws (Vibrant Neon Orange/Red) -->
    <!-- Left Large Fang -->
    <path d="M 180,310 C 180,310 160,370 200,400 C 210,410 220,380 210,360 C 200,340 195,320 195,310 Z" style="fill:#ff4400; stroke:#ff4400; stroke-width:4;"/>
    <!-- Right Large Fang -->
    <path d="M 332,310 C 332,310 352,370 312,400 C 302,410 292,380 302,360 C 312,340 317,320 317,310 Z" style="fill:#ff4400; stroke:#ff4400; stroke-width:4;"/>
    
    <!-- Center Small Fangs -->
    <path d="M 235,305 C 235,305 230,340 242,345 C 245,340 245,325 245,310 Z" style="fill:#ff4400; stroke:#ff4400; stroke-width:2;"/>
    <path d="M 277,305 C 277,305 282,340 270,345 C 267,340 267,325 267,310 Z" style="fill:#ff4400; stroke:#ff4400; stroke-width:2;"/>
  </g>
</svg>
